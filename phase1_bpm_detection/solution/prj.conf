# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Console output
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y

# ADC using Zephyr API (handles nRF54L15 quirks)
CONFIG_ADC=y

# Uncomment below for accurate power measurements (Module 8).
# Disabling UART/console prevents the PERI domain from staying active during sleep.
# CONFIG_LOG=n
# CONFIG_SERIAL=n
# CONFIG_CONSOLE=n
# CONFIG_UART_CONSOLE=n
